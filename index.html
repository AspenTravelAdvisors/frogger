<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FROGGER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #0a0a0f;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  font-family: 'Press Start 2P', monospace;
  color: #00ff88;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.012) 2px, rgba(0,255,136,0.012) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,255,136,0.012) 2px, rgba(0,255,136,0.012) 4px);
  pointer-events: none;
  z-index: 100;
}

#ui {
  display: flex;
  justify-content: space-between;
  width: 100%;
  max-width: 480px;
  padding: 8px 14px 4px;
  font-size: 9px;
  letter-spacing: 1px;
  text-shadow: 0 0 8px #00ff88;
  flex-shrink: 0;
}
#ui span { color: #ffcc00; text-shadow: 0 0 8px #ffcc00; }

#gameContainer {
  position: relative;
  border: 2px solid #00ff88;
  box-shadow: 0 0 24px rgba(0,255,136,0.3), inset 0 0 20px rgba(0,0,0,0.5);
  flex-shrink: 0;
}

canvas { display: block; }

#message {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.88);
  gap: 16px;
  text-shadow: 0 0 12px #00ff88;
  padding: 20px;
}

#message h1 {
  font-size: clamp(16px, 5vw, 28px);
  color: #ffcc00;
  text-shadow: 0 0 20px #ffcc00, 0 0 40px #ff8800;
  animation: pulse 1s ease-in-out infinite alternate;
}

#message p {
  color: #aaffcc;
  font-size: clamp(6px, 2vw, 9px);
  line-height: 2.2;
  text-align: center;
}

#message button {
  background: #00ff88;
  color: #000;
  border: none;
  padding: 12px 24px;
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(8px, 2.5vw, 11px);
  cursor: pointer;
  margin-top: 6px;
  box-shadow: 4px 4px 0 #007744;
  -webkit-tap-highlight-color: transparent;
}
#message button:active {
  transform: translate(3px, 3px);
  box-shadow: none;
}

@keyframes pulse {
  from { opacity: 1; } to { opacity: 0.55; }
}

#bottom-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 480px;
  padding: 4px 14px;
  flex-shrink: 0;
}

#lives-display {
  font-size: 8px;
  color: #ff4466;
  text-shadow: 0 0 8px #ff4466;
  letter-spacing: 2px;
}

#level-display {
  font-size: 8px;
  color: #aaffcc;
  text-shadow: 0 0 8px #aaffcc;
}

#dpad {
  display: none;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
  padding: 6px 0 max(env(safe-area-inset-bottom), 8px);
}

.dpad-row {
  display: flex;
  align-items: center;
}

.dpad-btn {
  width: 68px;
  height: 68px;
  background: rgba(0, 255, 136, 0.1);
  border: 2px solid rgba(0, 255, 136, 0.35);
  color: #00ff88;
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  border-radius: 6px;
  transition: background 0.05s;
}
.dpad-btn.pressed, .dpad-btn:active {
  background: rgba(0, 255, 136, 0.32);
  border-color: #00ff88;
}
.dpad-gap { width: 68px; height: 68px; }

@media (pointer: coarse), (max-width: 600px) {
  #dpad { display: flex; }
}
</style>
</head>
<body>

<div id="ui">
  <div>SC:<span id="score">0</span></div>
  <div>LV:<span id="level">1</span></div>
  <div>HI:<span id="hi">0</span></div>
  <div id="muteBtn" style="cursor:pointer;-webkit-tap-highlight-color:transparent;">♪</div>
</div>

<div id="gameContainer">
  <canvas id="canvas"></canvas>
  <div id="message">
    <h1>FROGGER</h1>
    <p>ARROW KEYS / WASD<br>OR USE THE BUTTONS BELOW<br><br>GET ALL 5 FROGS HOME!</p>
    <button onclick="startGame()">INSERT COIN</button>
  </div>
</div>

<div id="bottom-bar">
  <div id="lives-display">LIVES: <span id="livesSpan">●●●</span></div>
  <div id="level-display">LEVEL <span id="levelBig">1</span></div>
</div>

<div id="dpad">
  <div class="dpad-row">
    <div class="dpad-gap"></div>
    <button class="dpad-btn" id="btn-up">▲</button>
    <div class="dpad-gap"></div>
  </div>
  <div class="dpad-row">
    <button class="dpad-btn" id="btn-left">◀</button>
    <div class="dpad-gap"></div>
    <button class="dpad-btn" id="btn-right">▶</button>
  </div>
  <div class="dpad-row">
    <div class="dpad-gap"></div>
    <button class="dpad-btn" id="btn-down">▼</button>
    <div class="dpad-gap"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const COLS = 12, ROWS = 14;
let CELL, W, H;

let audioCtx = null;
let muted = false;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function tone(freq, dur, type='square', vol=0.18, slide=null, delay=0) {
  if (muted) return;
  const ac = getAudio(); if (!ac) return;
  const t0 = ac.currentTime + delay;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (slide != null) osc.frequency.exponentialRampToValueAtTime(Math.max(slide, 0.01), t0 + dur);
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(gain).connect(ac.destination);
  osc.start(t0);
  osc.stop(t0 + dur + 0.02);
}
function noise(dur, vol=0.12, delay=0) {
  if (muted) return;
  const ac = getAudio(); if (!ac) return;
  const t0 = ac.currentTime + delay;
  const len = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = (Math.random()*2-1) * (1 - i/len);
  const src = ac.createBufferSource(); src.buffer = buf;
  const gain = ac.createGain(); gain.gain.value = vol;
  src.connect(gain).connect(ac.destination);
  src.start(t0);
}
const SFX = {
  hop:    () => tone(620, 0.07, 'square', 0.12, 880),
  die:    () => { tone(300, 0.4, 'sawtooth', 0.18, 60); noise(0.35, 0.08); },
  home:   () => { tone(523, 0.08, 'square', 0.15); tone(784, 0.08, 'square', 0.15, null, 0.08); tone(1047, 0.16, 'square', 0.15, null, 0.16); },
  levelUp:() => { [523, 659, 784, 1047, 1319].forEach((f,i) => tone(f, 0.12, 'square', 0.16, null, i*0.09)); },
  gameOver:()=> { [440, 349, 277, 220].forEach((f,i) => tone(f, 0.22, 'sawtooth', 0.18, null, i*0.18)); },
  drown:  () => { tone(180, 0.5, 'sine', 0.16, 40); noise(0.4, 0.06); },
};
function toggleMute() {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '♪̸' : '♪';
  document.getElementById('muteBtn').style.opacity = muted ? '0.4' : '1';
}
document.getElementById('muteBtn').addEventListener('click', toggleMute);

function resize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const uiEl = document.getElementById('ui');
  const bbEl = document.getElementById('bottom-bar');
  const dpEl = document.getElementById('dpad');

  const showDpad = window.matchMedia('(pointer: coarse)').matches || vw <= 600;
  dpEl.style.display = showDpad ? 'flex' : 'none';

  const uiH = uiEl.offsetHeight || 28;
  const bbH = bbEl.offsetHeight || 22;
  const dpH = showDpad ? (dpEl.offsetHeight || 220) : 0;
  const padding = 12;
  const available = vh - uiH - bbH - dpH - padding;

  let cw = Math.min(vw - 4, 480);
  let ch = Math.floor(cw * ROWS / COLS);
  if (ch > available) { ch = available; cw = Math.floor(ch * COLS / ROWS); }

  cw = Math.floor(cw / COLS) * COLS;
  ch = Math.floor(ch / ROWS) * ROWS;

  CELL = Math.floor(cw / COLS);
  W = CELL * COLS;
  H = CELL * ROWS;

  canvas.width = W;
  canvas.height = H;
}

const C = {
  safe: '#1a2a1a', road: '#161616', water: '#091830',
  frog: '#00cc44', frogDark: '#007722', eye: '#fff', dead: '#ff4422',
};

let state = 'menu';
let score = 0, hiScore = 0, lives = 3, level = 1;
let frog, lanes, frame = 0;
let deathTimer = 0, winTimer = 0, homes = [];
let animId = null;

function initHomes() {
  homes = [
    { x: 1*CELL, filled: false },
    { x: 3*CELL, filled: false },
    { x: 5*CELL, filled: false },
    { x: 7*CELL, filled: false },
    { x: 9*CELL, filled: false },
  ];
}

function initFrog() {
  frog = { x: 5.5*CELL, y: H - CELL*1.5, dead: false, onLog: null };
}

function baseSpeed() {
  return Math.min(0.6 * Math.pow(1.65, level - 1), 4.0);
}

function makeLanes() {
  const s = baseSpeed();
  lanes = [];

  const roadCfgs = [
    { y: H-CELL*2.5, dir:-1, speed:s*1.15, type:'car',   color:'#ff3333', w:CELL*1.2, gap:CELL*4.5 },
    { y: H-CELL*3.5, dir: 1, speed:s*0.85, type:'car',   color:'#3399ff', w:CELL*1.8, gap:CELL*5   },
    { y: H-CELL*4.5, dir:-1, speed:s*1.35, type:'truck', color:'#ffaa00', w:CELL*2.5, gap:CELL*6   },
    { y: H-CELL*5.5, dir: 1, speed:s*0.95, type:'car',   color:'#cc33ff', w:CELL*1.2, gap:CELL*4.2 },
    { y: H-CELL*6.5, dir:-1, speed:s*1.25, type:'car',   color:'#ff6633', w:CELL*1.4, gap:CELL*5   },
  ];

  const waterCfgs = [
    { y: CELL*1.5, dir: 1, speed:s*0.65, type:'log',    color:'#5c3a1e', w:CELL*3,   gap:CELL*3   },
    { y: CELL*2.5, dir:-1, speed:s*0.85, type:'log',    color:'#6b4423', w:CELL*2,   gap:CELL*4   },
    { y: CELL*3.5, dir: 1, speed:s*0.50, type:'log',    color:'#5c3a1e', w:CELL*4,   gap:CELL*2.5 },
    { y: CELL*4.5, dir:-1, speed:s*1.05, type:'turtle', color:'#228855', w:CELL*1.8, gap:CELL*3.5 },
    { y: CELL*5.5, dir: 1, speed:s*0.75, type:'log',    color:'#6b4423', w:CELL*3,   gap:CELL*3   },
  ];

  [...roadCfgs, ...waterCfgs].forEach(cfg => {
    const objs = [];
    const spacing = cfg.w + cfg.gap;
    const count = Math.ceil(W / spacing) + 2;
    for (let i = 0; i < count; i++) {
      objs.push({
        x: cfg.dir === 1 ? -cfg.w - i*spacing : W + i*spacing,
        y: cfg.y, w: cfg.w
      });
    }
    lanes.push({ ...cfg, objs });
  });
}

function startGame() {
  document.getElementById('message').style.display = 'none';
  score = 0; lives = 3; level = 1;
  updateUI();
  resize();
  initHomes(); initFrog(); makeLanes();
  state = 'playing'; frame = 0;
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('levelBig').textContent = level;
  document.getElementById('hi').textContent = hiScore;
  document.getElementById('livesSpan').textContent = '●'.repeat(Math.max(0, lives));
}

function loop() {
  if (!['playing','dead','win'].includes(state)) return;
  frame++;
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

function update() {
  if (state === 'dead') {
    if (--deathTimer <= 0) {
      if (lives <= 0) showGameOver(); else { initFrog(); state = 'playing'; }
    }
    return;
  }
  if (state === 'win') {
    if (--winTimer <= 0) { level++; initHomes(); initFrog(); makeLanes(); updateUI(); state = 'playing'; }
    return;
  }

  lanes.forEach(lane => lane.objs.forEach(obj => {
    obj.x += lane.dir * lane.speed;
    const m = obj.w + 20;
    if (lane.dir === 1 && obj.x > W+20) obj.x = -m;
    if (lane.dir === -1 && obj.x < -m)  obj.x = W+20;
  }));

  frog.onLog = null;
  lanes.filter(l => l.type==='log'||l.type==='turtle').forEach(lane => {
    lane.objs.forEach(obj => {
      if (Math.abs(frog.y - lane.y) < CELL*0.45 &&
          frog.x+CELL*0.1 >= obj.x && frog.x-CELL*0.1 <= obj.x+obj.w) {
        frog.onLog = { lane, obj };
      }
    });
  });

  const fy = frog.y;
  const inWater = fy < CELL*6.5 && fy > CELL*0.8;
  if (inWater && !frog.onLog) { killFrog('drown'); return; }
  if (frog.onLog) frog.x += frog.onLog.lane.dir * frog.onLog.lane.speed;
  if (frog.x < -CELL*0.4 || frog.x > W+CELL*0.4) { killFrog('drown'); return; }

  lanes.filter(l => l.type==='car'||l.type==='truck').forEach(lane => {
    lane.objs.forEach(obj => {
      if (Math.abs(frog.y-lane.y) < CELL*0.42 &&
          frog.x+CELL*0.25 > obj.x && frog.x-CELL*0.25 < obj.x+obj.w) killFrog();
    });
  });

  if (fy <= CELL*0.9) checkHome();
}

function killFrog(cause) {
  if (frog.dead) return;
  frog.dead = true; lives--;
  (cause === 'drown' ? SFX.drown : SFX.die)();
  updateUI(); state = 'dead'; deathTimer = 90;
}

function checkHome() {
  let landed = false;
  homes.forEach(h => {
    if (!h.filled && Math.abs(frog.x-(h.x+CELL/2)) < CELL*0.55) {
      h.filled = true; score += 50+level*10; landed = true;
    }
  });
  if (!landed) { killFrog(); return; }
  SFX.home();
  hiScore = Math.max(hiScore, score); updateUI();
  if (homes.every(h => h.filled)) {
    score += 200; hiScore = Math.max(hiScore, score); updateUI();
    SFX.levelUp();
    state = 'win'; winTimer = 130;
  } else { initFrog(); }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = C.safe;
  ctx.fillRect(0, 0, W, CELL);
  ctx.fillRect(0, CELL*6.5, W, CELL);
  ctx.fillRect(0, H-CELL, W, CELL);

  ctx.fillStyle = C.water;
  ctx.fillRect(0, CELL, W, CELL*5.5);

  ctx.fillStyle = C.road;
  ctx.fillRect(0, CELL*7.5, W, CELL*5);

  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.setLineDash([CELL*0.5, CELL*0.5]);
  ctx.lineWidth = 1.5;
  for (let r=8; r<=12; r++) {
    ctx.beginPath(); ctx.moveTo(0, r*CELL); ctx.lineTo(W, r*CELL); ctx.stroke();
  }
  ctx.setLineDash([]);

  ctx.fillStyle = 'rgba(80,180,255,0.035)';
  for (let i=0; i<10; i++) {
    const sx = (i*55 + frame*0.35) % (W+40) - 40;
    ctx.fillRect(sx, CELL, 26, CELL*5.5);
  }

  homes.forEach(h => {
    ctx.fillStyle = h.filled ? '#00451a' : '#0b2e14';
    ctx.beginPath();
    ctx.ellipse(h.x+CELL/2, CELL*0.5, CELL*0.44, CELL*0.33, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = h.filled ? '#00ff88' : '#1a5c2e';
    ctx.lineWidth = 1.5; ctx.stroke();
    if (h.filled) {
      ctx.fillStyle = C.frog;
      ctx.beginPath();
      ctx.ellipse(h.x+CELL/2, CELL*0.5, CELL*0.21, CELL*0.16, 0, 0, Math.PI*2);
      ctx.fill();
    }
  });

  lanes.forEach(lane => lane.objs.forEach(obj => {
    if (lane.type==='log')    drawLog(obj, lane.color);
    else if (lane.type==='turtle') drawTurtle(obj);
    else if (lane.type==='car')    drawCar(obj, lane.color, lane.dir);
    else if (lane.type==='truck')  drawTruck(obj, lane.color, lane.dir);
  }));

  drawFrog();

  if (state==='dead') {
    ctx.fillStyle = `rgba(255,40,0,${0.32*(deathTimer/90)})`;
    ctx.fillRect(0, 0, W, H);
    ctx.font = `${Math.round(CELL*0.72)}px monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('💀', frog.x, frog.y);
  }
  if (state==='win') {
    ctx.fillStyle = `rgba(0,255,100,${0.1+0.07*Math.sin(frame*0.2)})`;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffcc00';
    ctx.font = `bold ${Math.round(CELL*0.38)}px 'Press Start 2P', monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('LEVEL UP!', W/2, H/2);
  }
}

function rr(x,y,w,h,r) { ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.fill(); }

function drawLog(obj, color) {
  const {x,y,w}=obj;
  ctx.fillStyle=color; rr(x, y-CELL*0.38, w, CELL*0.76, 7);
  ctx.fillStyle='rgba(255,190,80,0.1)'; rr(x+4, y-CELL*0.3, w-8, CELL*0.26, 4);
  ctx.strokeStyle='rgba(0,0,0,0.22)'; ctx.lineWidth=1;
  for (let lx=x+18; lx<x+w-8; lx+=18) {
    ctx.beginPath(); ctx.moveTo(lx,y-CELL*0.35); ctx.lineTo(lx,y+CELL*0.35); ctx.stroke();
  }
}

function drawTurtle(obj) {
  const {x,y,w}=obj;
  ctx.fillStyle='#1a5533'; rr(x, y-CELL*0.35, w, CELL*0.7, 9);
  ctx.fillStyle='#228855'; rr(x+3, y-CELL*0.25, w-6, CELL*0.5, 7);
  ctx.fillStyle='rgba(255,255,255,0.07)';
  ctx.beginPath(); ctx.ellipse(x+w/2-2, y-CELL*0.08, w*0.17, CELL*0.1, 0,0,Math.PI*2); ctx.fill();
}

function drawCar(obj, color, dir) {
  const {x,y,w}=obj, h=CELL*0.74, top=y-CELL*0.37;
  ctx.fillStyle=color; rr(x,top,w,h,5);
  ctx.fillStyle='rgba(200,230,255,0.42)';
  rr(dir===1?x+w*0.18:x+w*0.08, top+h*0.13, w*0.54, h*0.37, 3);
  ctx.fillStyle='#ffffaa';
  const hx=dir===1?x+w-3:x;
  ctx.fillRect(hx,top+3,3,5); ctx.fillRect(hx,top+h-8,3,5);
}

function drawTruck(obj, color, dir) {
  const {x,y,w}=obj, h=CELL*0.86, top=y-CELL*0.43;
  ctx.fillStyle=color; rr(x,top,w,h,4);
  ctx.fillStyle='rgba(0,0,0,0.26)';
  rr(dir===1?x+w*0.58:x, top, w*0.42, h, 4);
  ctx.fillStyle='rgba(200,230,255,0.32)';
  rr(dir===1?x+w*0.61:x+4, top+4, w*0.3, h*0.42, 3);
}

function drawFrog() {
  if (frog.dead) return;
  const x=frog.x, y=frog.y, b=Math.sin(frame*0.18)*1.2;
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(x,y+CELL*0.34,CELL*0.26,CELL*0.09,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C.frog;
  ctx.beginPath(); ctx.ellipse(x,y+b,CELL*0.28,CELL*0.23,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x,y-CELL*0.17+b,CELL*0.21,CELL*0.17,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C.frogDark;
  ctx.beginPath(); ctx.ellipse(x-CELL*0.11,y-CELL*0.27+b,CELL*0.07,CELL*0.08,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+CELL*0.11,y-CELL*0.27+b,CELL*0.07,CELL*0.08,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C.eye;
  ctx.beginPath(); ctx.ellipse(x-CELL*0.10,y-CELL*0.28+b,CELL*0.033,CELL*0.033,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+CELL*0.12,y-CELL*0.28+b,CELL*0.033,CELL*0.033,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C.frogDark;
  ctx.beginPath(); ctx.ellipse(x-CELL*0.27,y+CELL*0.19+b,CELL*0.09,CELL*0.054,Math.PI*0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+CELL*0.27,y+CELL*0.19+b,CELL*0.09,CELL*0.054,-Math.PI*0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x-CELL*0.24,y-CELL*0.04+b,CELL*0.07,CELL*0.044,Math.PI*0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+CELL*0.24,y-CELL*0.04+b,CELL*0.07,CELL*0.044,-Math.PI*0.4,0,Math.PI*2); ctx.fill();
}

function showGameOver() {
  hiScore = Math.max(hiScore, score);
  SFX.gameOver();
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  state = 'menu';
  const msg = document.getElementById('message');
  msg.style.display = 'flex';
  msg.innerHTML = `
    <h1>GAME OVER</h1>
    <p>SCORE: ${score}<br><br>BEST: ${hiScore}</p>
    <button onclick="startGame()">TRY AGAIN</button>
  `;
}

function moveStep(dir) {
  if (state !== 'playing') return;
  let moved = false;
  if (dir==='up'    && frog.y > CELL*0.5)      { frog.y -= CELL; moved=true; }
  if (dir==='down'  && frog.y < H-CELL*0.6)    { frog.y += CELL; moved=true; }
  if (dir==='left'  && frog.x > CELL*0.5)      { frog.x -= CELL; moved=true; }
  if (dir==='right' && frog.x < W-CELL*0.5)    { frog.x += CELL; moved=true; }
  if (moved) { score += 1; updateUI(); SFX.hop(); }
}

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:'up', w:'up', W:'up',
    ArrowDown:'down', s:'down', S:'down',
    ArrowLeft:'left', a:'left', A:'left',
    ArrowRight:'right', d:'right', D:'right',
  };
  if (map[e.key]) { e.preventDefault(); moveStep(map[e.key]); }
  if (e.key === 'm' || e.key === 'M') { e.preventDefault(); toggleMute(); }
});

['up','down','left','right'].forEach(dir => {
  const btn = document.getElementById('btn-'+dir);
  const fire = e => { e.preventDefault(); btn.classList.add('pressed'); moveStep(dir); };
  const release = e => { e.preventDefault(); btn.classList.remove('pressed'); };
  btn.addEventListener('touchstart', fire, { passive:false });
  btn.addEventListener('touchend', release, { passive:false });
  btn.addEventListener('mousedown', fire);
  btn.addEventListener('mouseup', release);
  btn.addEventListener('mouseleave', release);
});

let tx, ty;
canvas.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend', e => {
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if (Math.abs(dx)<10 && Math.abs(dy)<10) return;
  moveStep(Math.abs(dx)>Math.abs(dy) ? (dx>0?'right':'left') : (dy>0?'down':'up'));
  e.preventDefault();
}, {passive:false});

resize();
window.addEventListener('resize', () => { resize(); if (state==='playing') { initFrog(); makeLanes(); initHomes(); } });
</script>
